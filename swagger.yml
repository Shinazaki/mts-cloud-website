openapi: 3.0.3
info:
  title: MTS Spacehack Backend API
  description: |
    Панель управления облачной инфраструктурой на базе Proxmox VE.
    
    **Аутентификация:** JWT Bearer-токен (access_token) в заголовке `Authorization`.
    Refresh-токен хранится в HttpOnly cookie `refresh_token`.
  version: '1.0'
  contact:
    name: MTS Spacehack Team

servers:
  - url: /
    description: API server

components:
  securitySchemes:
    access-token:
      type: http
      scheme: bearer
      bearerFormat: JWT
    refresh-token:
      type: apiKey
      in: cookie
      name: refresh_token

  schemas:
    # ─── Auth ──────────────────────────────────────────
    CreateUserDto:
      type: object
      required: [username, password, email, firstName, lastName, phoneNumber]
      properties:
        username:
          type: string
          minLength: 3
          example: johndoe123
        password:
          type: string
          format: password
          minLength: 8
          example: '12345678'
        email:
          type: string
          format: email
          example: john.doe@example.com
        firstName:
          type: string
          minLength: 2
          example: John
        lastName:
          type: string
          example: Doe
        surName:
          type: string
          nullable: true
          example: Nikolayevich
        phoneNumber:
          type: string
          example: '+123456789'

    LoginUserDto:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          example: johndoe123
        password:
          type: string
          format: password
          minLength: 8
          example: '12345678'

    ChangePasswordDto:
      type: object
      required: [oldPassword, newPassword]
      properties:
        oldPassword:
          type: string
          format: password
          minLength: 8
          example: '12345678'
        newPassword:
          type: string
          format: password
          minLength: 8
          example: '87654321'

    # ─── Users ─────────────────────────────────────────
    UpdateUserDto:
      type: object
      properties:
        email:
          type: string
          format: email
          example: john.doe@example.com
        password:
          type: string
          format: password
          minLength: 8
          description: Текущий пароль для подтверждения
          example: '123456789'
        firstName:
          type: string
          minLength: 2
          example: John
        lastName:
          type: string
          example: Doe
        surName:
          type: string
          example: Nikolayevich
        phoneNumber:
          type: string
          example: '+123456789'

    AssignRolesDto:
      type: object
      required: [roles]
      properties:
        roles:
          type: array
          items:
            type: string
          minItems: 1
          example: ['admin', 'user']

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          example: john.doe@example.com
        username:
          type: string
          example: johndoe123
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        surName:
          type: string
          nullable: true
          example: Nikolayevich
        phoneNumber:
          type: string
          example: '+123456789'
        balance:
          type: number
          example: 0
        created_at:
          type: string
          format: date-time
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'

    Role:
      type: object
      properties:
        id:
          type: integer
          example: 1
        role:
          type: string
          example: admin
        description:
          type: string
          nullable: true
          example: Администратор системы

    # ─── VPS ───────────────────────────────────────────
    VmConfiguration:
      type: object
      required: [cpu, ram, ssd]
      properties:
        cpu:
          type: integer
          minimum: 1
          maximum: 32
          example: 2
          description: Количество vCPU
        ram:
          type: integer
          minimum: 16
          maximum: 1100
          example: 8
          description: RAM в MB (или GB в зависимости от логики)
        ssd:
          type: integer
          minimum: 10
          maximum: 8000
          example: 16
          description: Диск SSD в GB

    CreateVmDto:
      type: object
      required: [name, configuration]
      properties:
        name:
          type: string
          minLength: 3
          example: best-VM
        configuration:
          $ref: '#/components/schemas/VmConfiguration'

    UpdateVmDto:
      type: object
      required: [id, configuration]
      properties:
        id:
          type: integer
          description: Внутренний ID VM в БД
          example: 1
        configuration:
          $ref: '#/components/schemas/VmConfiguration'

    ChangeVmStatusDto:
      type: object
      required: [id]
      properties:
        id:
          type: integer
          description: Внутренний ID VM в БД
          example: 1

    VirtualMachine:
      type: object
      properties:
        id:
          type: integer
          example: 1
        proxmox_id:
          type: integer
          nullable: true
          example: 100
        name:
          type: string
          example: best-VM
        user_id:
          type: integer
          example: 1

    CreateSnapshotDto:
      type: object
      required: [vmId, snapname]
      properties:
        vmId:
          type: integer
          description: Внутренний ID VM
          example: 1
        snapname:
          type: string
          pattern: '^[A-Za-z0-9_-]+$'
          example: before-update
        description:
          type: string
          nullable: true
          example: Снапшот перед обновлением
        vmstate:
          type: boolean
          default: false
          description: Включить RAM-состояние

    SnapshotActionDto:
      type: object
      required: [vmId, snapname]
      properties:
        vmId:
          type: integer
          example: 1
        snapname:
          type: string
          pattern: '^[A-Za-z0-9_-]+$'
          example: before-update

    # ─── LXC ──────────────────────────────────────────
    CreateLxcDto:
      type: object
      required: [hostname]
      properties:
        hostname:
          type: string
          pattern: '^[A-Za-z0-9_-]+$'
          example: my-container
        ostemplate:
          type: string
          example: 'local:vztmpl/alpine-3.22-default_20250617_amd64.tar.xz'
        memory:
          type: integer
          minimum: 64
          maximum: 65536
          example: 512
          description: RAM в MB
        cores:
          type: integer
          minimum: 1
          maximum: 32
          example: 1
        rootfs:
          type: string
          example: 'local-lvm:8'
          description: 'Хранилище:размер_GB'
        password:
          type: string
          description: Пароль root (по умолчанию admin)
        sshPublicKeys:
          type: string
          description: 'SSH public key (ssh-rsa/ssh-ed25519 ...)'
          example: 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAA... user@host'
        net0:
          type: string
          example: 'name=eth0,bridge=vmbr0,ip=dhcp'
        unprivileged:
          type: boolean
          default: true
        start:
          type: boolean
          default: false

    UpdateLxcDto:
      type: object
      properties:
        memory:
          type: integer
          minimum: 64
          maximum: 65536
          example: 512
        cores:
          type: integer
          minimum: 1
          maximum: 32
          example: 2
        hostname:
          type: string
          example: new-hostname
        description:
          type: string
          example: Мой контейнер

    # ─── Tickets ───────────────────────────────────────
    CreateTicketDto:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
          minLength: 3
          example: create vm error
        description:
          type: string
          example: VM не создаётся, ошибка таймаута

    Ticket:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
        name:
          type: string
          example: create vm error
        description:
          type: string

    # ─── Corporations ──────────────────────────────────
    CreateCorporationDto:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 3
          example: best corporation name
        description:
          type: string
          nullable: true
          example: test description

    Corporation:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: best corporation name
        description:
          type: string
          nullable: true
        adminId:
          type: integer
          example: 1
        members:
          type: array
          items:
            $ref: '#/components/schemas/User'

    # ─── Pools ─────────────────────────────────────────
    CreatePoolDto:
      type: object
      required: [poolid]
      properties:
        poolid:
          type: string
          pattern: '^[A-Za-z0-9_-]+$'
          example: corp_42
        comment:
          type: string
          example: Ресурсы корпорации 42

    UpdatePoolDto:
      type: object
      properties:
        vms:
          type: string
          description: VMID через запятую
          example: '100,101'
        storage:
          type: string
          description: Хранилища через запятую
          example: 'local-lvm'
        comment:
          type: string
        delete:
          type: boolean
          description: Удалить ресурсы из пула вместо добавления
          default: false

    # ─── RBAC ──────────────────────────────────────────
    CreateRoleDto:
      type: object
      required: [roleid, privs]
      properties:
        roleid:
          type: string
          pattern: '^[A-Za-z0-9_-]+$'
          example: TenantAdmin
        privs:
          type: string
          description: Привилегии через запятую
          example: 'VM.Audit,VM.Console,VM.PowerMgmt'

    UpdateRoleDto:
      type: object
      required: [privs]
      properties:
        privs:
          type: string
          example: 'VM.Audit,VM.Console'
        append:
          type: boolean
          default: false
          description: Добавить к существующим привилегиям (true) или заменить (false)

    CreatePveUserDto:
      type: object
      required: [userid]
      properties:
        userid:
          type: string
          pattern: '^[A-Za-z0-9._-]+@[A-Za-z0-9._-]+$'
          example: john@pve
        password:
          type: string
        email:
          type: string
          format: email
          example: john@example.com
        firstname:
          type: string
        lastname:
          type: string
        groups:
          type: string
          description: Группы через запятую
          example: admins,users
        comment:
          type: string
        enable:
          type: boolean
          default: true

    UpdatePveUserDto:
      type: object
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        firstname:
          type: string
        lastname:
          type: string
        groups:
          type: string
        comment:
          type: string
        enable:
          type: boolean

    UpdateAclDto:
      type: object
      required: [path, roles]
      properties:
        path:
          type: string
          description: Путь ресурса Proxmox
          example: /vms/100
        roles:
          type: string
          description: Роль(и) через запятую
          example: TenantAdmin
        users:
          type: string
          description: 'Пользователь(и) user@realm через запятую'
          example: john@pve
        groups:
          type: string
          description: Группа(ы) через запятую
        propagate:
          type: boolean
          default: true
          description: Распространять права вниз по дереву
        delete:
          type: boolean
          default: false
          description: Удалить ACL-запись вместо добавления

paths:
  # ═══════════════════════════════════════════════════════
  #  Health
  # ═══════════════════════════════════════════════════════
  /api:
    get:
      operationId: AppController_getHello
      summary: Health-check (версия API)
      tags: [Health]
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string

  # ═══════════════════════════════════════════════════════
  #  Auth
  # ═══════════════════════════════════════════════════════
  /api/auth/register:
    post:
      operationId: AuthController_register
      summary: Регистрация нового пользователя
      description: |
        Создаёт пользователя и возвращает:
        - `access_token` в заголовке ответа
        - `refresh_token` в HttpOnly cookie
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserDto'
      responses:
        '201':
          description: Пользователь создан
          headers:
            access_token:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Валидация не пройдена
        '409':
          description: Username или email уже существует

  /api/auth/login:
    post:
      operationId: AuthController_login
      summary: Авторизация
      description: |
        Возвращает access_token в заголовке + refresh_token в HttpOnly cookie.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginUserDto'
      responses:
        '201':
          description: Успешная авторизация
          headers:
            access_token:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Неверный логин или пароль

  /api/auth/refresh:
    post:
      operationId: AuthController_refresh
      summary: Обновить токены (ротация)
      description: |
        Берёт refresh_token из HttpOnly cookie → выдаёт новую пару access + refresh.
      tags: [Auth]
      security:
        - refresh-token: []
      responses:
        '201':
          description: Новая пара токенов
          headers:
            access_token:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '401':
          description: Refresh-токен отсутствует, истёк или отозван

  /api/auth/change_password:
    post:
      operationId: AuthController_changePassword
      summary: Сменить пароль
      description: Требует текущий пароль для подтверждения. Инвалидирует все сессии.
      tags: [Auth]
      security:
        - access-token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordDto'
      responses:
        '201':
          description: Пароль изменён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Не авторизован или старый пароль неверен

  /api/auth/logout:
    delete:
      operationId: AuthController_logout
      summary: Выйти (текущая сессия)
      description: Инвалидирует refresh_token текущей сессии и удаляет cookie.
      tags: [Auth]
      security:
        - refresh-token: []
      responses:
        '200':
          description: Сессия завершена
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '401':
          description: Refresh-токен отсутствует

  /api/auth/logout_all:
    delete:
      operationId: AuthController_logoutAll
      summary: Выйти со всех устройств
      description: Инвалидирует все refresh-токены пользователя.
      tags: [Auth]
      security:
        - refresh-token: []
      responses:
        '200':
          description: Все сессии завершены
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '401':
          description: Refresh-токен отсутствует

  # ═══════════════════════════════════════════════════════
  #  Users
  # ═══════════════════════════════════════════════════════
  /api/users:
    post:
      operationId: UsersController_create
      summary: Создать пользователя (admin)
      tags: [Users]
      security:
        - access-token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserDto'
      responses:
        '201':
          description: Пользователь создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Валидация не пройдена
        '401':
          description: Не авторизован / нет роли admin
    get:
      operationId: UsersController_findAll
      summary: Список всех пользователей (admin)
      tags: [Users]
      security:
        - access-token: []
      responses:
        '200':
          description: Массив пользователей
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          description: Не авторизован

  /api/users/{id}:
    get:
      operationId: UsersController_findOne
      summary: Получить пользователя по ID
      tags: [Users]
      security:
        - access-token: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Пользователь найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Пользователь не найден

  /api/users/update_info:
    patch:
      operationId: UsersController_updateUser
      summary: Обновить профиль текущего пользователя
      tags: [Users]
      security:
        - access-token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserDto'
      responses:
        '200':
          description: Профиль обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Невалидные данные или нет изменений
        '401':
          description: Не авторизован или пароль неверен
        '404':
          description: Пользователь не найден

  /api/users/{id}/roles:
    patch:
      operationId: UsersController_assignRoles
      summary: Назначить роли пользователю (admin)
      description: |
        Заменяет роли пользователя и инвалидирует все его сессии.
        Пользователю потребуется повторно войти — при следующем login/refresh
        он получит access_token с актуальными ролями.
      tags: [Users]
      security:
        - access-token: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID пользователя
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRolesDto'
      responses:
        '200':
          description: Роли обновлены, сессии инвалидированы
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Пользователь или роль не найдены

  # ═══════════════════════════════════════════════════════
  #  VPS
  # ═══════════════════════════════════════════════════════
  /api/vps/admin/proxmox-vms:
    get:
      operationId: VpsController_getProxmoxVmList
      summary: Все VM на ноде из Proxmox (admin)
      tags: [VPS]
      security:
        - access-token: []
      responses:
        '200':
          description: Массив VM из Proxmox
        '401':
          description: Не авторизован / нет роли admin

  /api/vps/admin/cluster-resources:
    get:
      operationId: VpsController_getClusterResources
      summary: Все ресурсы кластера Proxmox (admin)
      tags: [VPS]
      security:
        - access-token: []
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [vm, storage, node, sdn]
      responses:
        '200':
          description: Ресурсы кластера
        '401':
          description: Не авторизован

  /api/vps/create:
    post:
      operationId: VpsController_create
      summary: Создать VM (клон шаблона + cloud-init)
      tags: [VPS]
      security:
        - access-token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVmDto'
      responses:
        '201':
          description: VM создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualMachine'
        '400':
          description: Валидация не пройдена
        '401':
          description: Не авторизован

  /api/vps:
    get:
      operationId: VpsController_findAll
      summary: Список всех VM (admin)
      tags: [VPS]
      security:
        - access-token: []
      responses:
        '200':
          description: Массив VM
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VirtualMachine'

  /api/vps/update:
    patch:
      operationId: VpsController_updateVm
      summary: Обновить конфигурацию VM (CPU, RAM, Disk)
      tags: [VPS]
      security:
        - access-token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVmDto'
      responses:
        '200':
          description: Конфигурация обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualMachine'
        '401':
          description: Не авторизован

  /api/vps/delete:
    delete:
      operationId: VpsController_deleteVm
      summary: Удалить VM
      tags: [VPS]
      security:
        - access-token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeVmStatusDto'
      responses:
        '200':
          description: VM удалена из Proxmox и БД
        '404':
          description: VM не найдена или не принадлежит пользователю

  /api/vps/start:
    post:
      operationId: VpsController_startVm
      summary: Запустить VM
      tags: [VPS]
      security:
        - access-token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeVmStatusDto'
      responses:
        '201':
          description: Команда запуска отправлена
        '404':
          description: VM не найдена

  /api/vps/stop:
    post:
      operationId: VpsController_stopVm
      summary: Остановить VM (hard stop)
      tags: [VPS]
      security:
        - access-token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeVmStatusDto'
      responses:
        '201':
          description: Команда остановки отправлена
        '404':
          description: VM не найдена

